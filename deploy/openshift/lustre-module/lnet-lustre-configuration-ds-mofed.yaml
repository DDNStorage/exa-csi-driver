---
# Image version - update this single line to change the image for both containers
x-image: &lustre-image "image-registry.openshift-image-registry.svc:5000/openshift-kmm/lustre-client-moduleloader:mofed25.10-v1"

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: lnet-configuration
spec:
  selector:
    matchLabels:
      name: lnet-configuration
  template:
    metadata:
      labels:
        name: lnet-configuration
      # Note: IP configuration on InfiniBand interfaces must be done
      # by the customer before deploying this DaemonSet (see README-MOFED.md)
    spec:
      nodeSelector:
        kmm.node.kubernetes.io/openshift-kmm.lnet.ready:
      hostNetwork: true
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
      serviceAccount: kmm-operator-module-loader
      serviceAccountName: kmm-operator-module-loader
      initContainers:
      - name: configure-lnet
        image: *lustre-image
        command:
          - /bin/sh
          - -c
          - |
            set -e

            # Note: libcfs module with cpu_npartitions is loaded by KMM Module (lnet-mod-mofed.yaml)
            # Verify it was loaded correctly
            echo "Verifying libcfs configuration (set by KMM):"
            echo "  cpu_npartitions: $(cat /sys/module/libcfs/parameters/cpu_npartitions 2>/dev/null || echo 'N/A')"
            echo "  cpu_pattern: $(cat /sys/module/libcfs/parameters/cpu_pattern 2>/dev/null || echo 'N/A')"

            # Configure LNet
            echo "Configuring LNet: net=${NET_TYPE}, iface=${NET_IFACE}"
            echo "Initializing LNet..."
            lnetctl lnet configure

            # Parse comma-separated interface list from NET_IFACE
            IFS=',' read -ra IFACES <<< "${NET_IFACE}"
            IFACE_LIST=""
            for i in "${!IFACES[@]}"; do
              IFACE_LIST="${IFACE_LIST}              $i: ${IFACES[$i]}\n"
            done

            # Generate YAML configuration with tunables
            cat >/tmp/lnet.yaml <<EOF
            net:
              - net type: ${NET_TYPE}
                local NI(s):
                  - interfaces:
            $(echo -e "${IFACE_LIST}")
                    tunables:
                      peer_timeout: ${LNET_PEER_TIMEOUT}
                      peer_credits: ${LNET_PEER_CREDITS}
                      peer_buffer_credits: ${LNET_PEER_BUFFER_CREDITS}
                      credits: ${LNET_CREDITS}
                    lnd tunables:
                      peercredits_hiw: ${LNET_PEERCREDITS_HIW}
                      map_on_demand: ${LNET_MAP_ON_DEMAND}
                      concurrent_sends: ${LNET_CONCURRENT_SENDS}
                      fmr_pool_size: ${LNET_FMR_POOL_SIZE}
                      fmr_flush_trigger: ${LNET_FMR_FLUSH_TRIGGER}
                      fmr_cache: ${LNET_FMR_CACHE}
                      ntx: ${LNET_NTX}
                      conns_per_peer: ${LNET_CONNS_PER_PEER}
            EOF

            echo "=== Generated LNet Configuration ==="
            cat /tmp/lnet.yaml
            echo "=== Importing Configuration ==="
            lnetctl import < /tmp/lnet.yaml

            echo "Loading Lustre client modules..."
            set +e  # Don't exit on error for module loading
            modprobe lustre
            if [ $? -ne 0 ]; then
              echo "WARNING: modprobe lustre failed"
              echo "Checking module location:"
              KERNEL_VERSION=$(uname -r)
              find /lib/modules/${KERNEL_VERSION} -name "lustre.ko"
              echo "Trying direct insmod..."
              insmod /lib/modules/${KERNEL_VERSION}/extra/lustre.ko || echo "ERROR: Could not load lustre module"
            else
              echo "Lustre module loaded successfully"
            fi

            modprobe mgc
            if [ $? -ne 0 ]; then
              echo "WARNING: modprobe mgc failed"
              echo "Checking module location:"
              KERNEL_VERSION=$(uname -r)
              find /lib/modules/${KERNEL_VERSION} -name "mgc.ko"
              echo "Trying direct insmod..."
              insmod /lib/modules/${KERNEL_VERSION}/extra/mgc.ko || echo "ERROR: Could not load mgc module"
            else
              echo "MGC module loaded successfully"
            fi
            set -e

            echo "Loaded modules:"
            lsmod | grep -E "lustre|mgc" || echo "Modules not visible in lsmod"

            echo "=== LNet Status ==="
            lnetctl net show -v
            echo "=== Configuration Complete ==="
        env:
          # Network configuration
          - name: NET_TYPE
            value: "o2ib"
          - name: NET_IFACE
            value: "ibs1f1"

          # LNet tunables - override these values as needed
          - name: LNET_PEER_TIMEOUT
            value: "180"
          - name: LNET_PEER_CREDITS
            value: "32"
          - name: LNET_PEER_BUFFER_CREDITS
            value: "0"
          - name: LNET_CREDITS
            value: "256"

          # LND (o2ib) tunables - override these values as needed
          - name: LNET_PEERCREDITS_HIW
            value: "16"
          - name: LNET_MAP_ON_DEMAND
            value: "1"
          - name: LNET_CONCURRENT_SENDS
            value: "64"
          - name: LNET_FMR_POOL_SIZE
            value: "512"
          - name: LNET_FMR_FLUSH_TRIGGER
            value: "384"
          - name: LNET_FMR_CACHE
            value: "1"
          - name: LNET_NTX
            value: "512"
          - name: LNET_CONNS_PER_PEER
            value: "1"
        securityContext:
          allowPrivilegeEscalation: true
          privileged: true
          runAsUser: 0
          seLinuxOptions:
            type: spc_t
      containers:
      - name: lnet-configuration
        image: *lustre-image
        imagePullPolicy: Always
        command:
          - /bin/sh
          - -c
          - |
            trap "sleep 10" TERM
            while true; do sleep 5; done
        securityContext:
          allowPrivilegeEscalation: true
          privileged: true
          runAsUser: 0
          seLinuxOptions:
            type: spc_t
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
