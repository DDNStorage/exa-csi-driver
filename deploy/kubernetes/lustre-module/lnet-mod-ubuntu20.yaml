apiVersion: kmm.sigs.x-k8s.io/v1beta1
kind: Module
metadata:
  name: lnet-ubuntu20
  namespace: lustre-kmm
spec:
  moduleLoader:
    container:
      modprobe:
        moduleName: libcfs
        dirName: /opt
        # Load libcfs first (no parameters - let it auto-detect CPU partitions)
        modulesLoadingOrder:
          - libcfs # Core infrastructure (MUST be first - matches moduleName)
          - lnet # Lustre network layer
          - ksocklnd # TCP/IP transport

      kernelMappings:
        # Ubuntu 20.04 - Kernel 5.4.0-*-generic (native kernel)
        # Supports: 5.4.0-182-generic, 5.4.0-200-generic, etc.
        - regexp: '^5\.4\.0-[0-9]+-generic$'
          containerImage: "<REGISTRY_URL>/lustre-client-ubuntu20:${KERNEL_FULL_VERSION}"
          build:
            buildArgs:
              - name: LUSTRE_TARBALL_NAME
                value: "<LUSTRE_TARBALL_NAME>"
              - name: LUSTRE_SOURCE_URL
                value: "http://<LUSTRE_SOURCE_SERVER>/<LUSTRE_TARBALL_NAME>"
            baseImageRegistryTLS:
              insecure: true
              insecureSkipTLSVerify: true
            dockerfileConfigMap:
              name: lustre-ubuntu20-dockerfile
          registryTLS:
            insecure: true
            insecureSkipTLSVerify: true

        # Ubuntu 20.04 - Kernel 5.13.0-*-generic (HWE kernel)
        # Supports: 5.13.0-*-generic
        - regexp: '^5\.13\.0-[0-9]+-generic$'
          containerImage: "<REGISTRY_URL>/lustre-client-ubuntu20:${KERNEL_FULL_VERSION}"
          build:
            buildArgs:
              - name: LUSTRE_TARBALL_NAME
                value: "<LUSTRE_TARBALL_NAME>"
              - name: LUSTRE_SOURCE_URL
                value: "http://<LUSTRE_SOURCE_SERVER>/<LUSTRE_TARBALL_NAME>"
            baseImageRegistryTLS:
              insecure: true
              insecureSkipTLSVerify: true
            dockerfileConfigMap:
              name: lustre-ubuntu20-dockerfile
          registryTLS:
            insecure: true
            insecureSkipTLSVerify: true

        # Ubuntu 20.04 - Kernel 5.15.0-*-generic (HWE kernel from 22.04)
        # Supports: 5.15.0-100-generic, 5.15.0-139-generic, 5.15.0-160-generic, etc.
        - regexp: '^5\.15\.0-[0-9]+-generic$'
          containerImage: "<REGISTRY_URL>/lustre-client-ubuntu20:${KERNEL_FULL_VERSION}"
          build:
            buildArgs:
              - name: LUSTRE_TARBALL_NAME
                value: "<LUSTRE_TARBALL_NAME>"
              - name: LUSTRE_SOURCE_URL
                value: "http://<LUSTRE_SOURCE_SERVER>/<LUSTRE_TARBALL_NAME>"
            baseImageRegistryTLS:
              insecure: true
              insecureSkipTLSVerify: true
            dockerfileConfigMap:
              name: lustre-ubuntu20-dockerfile
          registryTLS:
            insecure: true
            insecureSkipTLSVerify: true

  selector:
    node-role.kubernetes.io/worker: ""
    os-version: ubuntu-20.04
