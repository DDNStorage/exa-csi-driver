apiVersion: kmm.sigs.x-k8s.io/v1beta1
kind: Module
metadata:
  name: lustre-client-ubuntu24
  namespace: lustre-kmm
spec:
  moduleLoader:
    container:
      modprobe:
        moduleName: lustre # Main Lustre filesystem module (loaded via DaemonSet)
        dirName: /opt
        # NOTE: This Module is OPTIONAL - filesystem modules are loaded by lnet-configuration-tcp-ubuntu24.yaml DaemonSet
        # This file exists for reference/alternative deployment patterns only

      kernelMappings:
        # Ubuntu 24.04 - Kernel 6.8.0-*-generic (GA/native kernel - wildcard for all versions)
        - regexp: '^6\.8\.0-[0-9]+-generic$'
          containerImage: "<REGISTRY_URL>/lustre-client-ubuntu24:${KERNEL_FULL_VERSION}"
          build:
            buildArgs:
              - name: LUSTRE_TARBALL_NAME
                value: "<LUSTRE_TARBALL_NAME>"
              - name: LUSTRE_SOURCE_URL
                value: "http://<LUSTRE_SOURCE_SERVER>/<LUSTRE_TARBALL_NAME>"
            baseImageRegistryTLS:
              insecure: true
              insecureSkipTLSVerify: true
            dockerfileConfigMap:
              name: lustre-ubuntu24-dockerfile
          registryTLS:
            insecure: true
            insecureSkipTLSVerify: true

        # Ubuntu 24.04 - Kernel 6.11.0-*-generic (HWE kernel from 24.10)
        - regexp: '^6\.11\.0-[0-9]+-generic$'
          containerImage: "<REGISTRY_URL>/lustre-client-ubuntu24:${KERNEL_FULL_VERSION}"
          build:
            buildArgs:
              - name: LUSTRE_TARBALL_NAME
                value: "<LUSTRE_TARBALL_NAME>"
              - name: LUSTRE_SOURCE_URL
                value: "http://<LUSTRE_SOURCE_SERVER>/<LUSTRE_TARBALL_NAME>"
            baseImageRegistryTLS:
              insecure: true
              insecureSkipTLSVerify: true
            dockerfileConfigMap:
              name: lustre-ubuntu24-dockerfile
          registryTLS:
            insecure: true
            insecureSkipTLSVerify: true

        # Ubuntu 24.04 - Kernel 6.14.0-*-generic (HWE kernel from 25.04)
        - regexp: '^6\.14\.0-[0-9]+-generic$'
          containerImage: "<REGISTRY_URL>/lustre-client-ubuntu24:${KERNEL_FULL_VERSION}"
          build:
            buildArgs:
              - name: LUSTRE_TARBALL_NAME
                value: "<LUSTRE_TARBALL_NAME>"
              - name: LUSTRE_SOURCE_URL
                value: "http://<LUSTRE_SOURCE_SERVER>/<LUSTRE_TARBALL_NAME>"
            baseImageRegistryTLS:
              insecure: true
              insecureSkipTLSVerify: true
            dockerfileConfigMap:
              name: lustre-ubuntu24-dockerfile
          registryTLS:
            insecure: true
            insecureSkipTLSVerify: true

        # Ubuntu 24.04 - Kernel 6.17.0-*-generic (HWE kernel from 25.10)
        - regexp: '^6\.17\.0-[0-9]+-generic$'
          containerImage: "<REGISTRY_URL>/lustre-client-ubuntu24:${KERNEL_FULL_VERSION}"
          build:
            buildArgs:
              - name: LUSTRE_TARBALL_NAME
                value: "<LUSTRE_TARBALL_NAME>"
              - name: LUSTRE_SOURCE_URL
                value: "http://<LUSTRE_SOURCE_SERVER>/<LUSTRE_TARBALL_NAME>"
            baseImageRegistryTLS:
              insecure: true
              insecureSkipTLSVerify: true
            dockerfileConfigMap:
              name: lustre-ubuntu24-dockerfile
          registryTLS:
            insecure: true
            insecureSkipTLSVerify: true

  selector:
    node-role.kubernetes.io/worker: ""
    os-version: ubuntu-24.04
    # Dependency: Requires lnet-mod-ubuntu24 to be loaded first (libcfs, lnet, ksocklnd)
    kmm.node.kubernetes.io/lustre-kmm.lnet-ubuntu24.ready: ""
