apiVersion: kmm.sigs.x-k8s.io/v1beta1
kind: Module
metadata:
  name: lustre-client-ubuntu20
  namespace: lustre-kmm
spec:
  moduleLoader:
    container:
      modprobe:
        moduleName: lustre # Main Lustre filesystem module (loaded via DaemonSet)
        dirName: /opt
        # NOTE: This Module is OPTIONAL - filesystem modules are loaded by lnet-configuration-tcp-ubuntu20.yaml DaemonSet
        # This file exists for reference/alternative deployment patterns only

      kernelMappings:
        # Ubuntu 20.04 - Kernel 5.4.0-*-generic (native kernel)
        # Supports: 5.4.0-182-generic, 5.4.0-200-generic, etc.
        - regexp: '^5\.4\.0-[0-9]+-generic$'
          containerImage: "<REGISTRY_URL>/lustre-client-ubuntu20:${KERNEL_FULL_VERSION}"
          build:
            buildArgs:
              - name: LUSTRE_TARBALL_NAME
                value: "<LUSTRE_TARBALL_NAME>"
              - name: LUSTRE_SOURCE_URL
                value: "http://<LUSTRE_SOURCE_SERVER>/<LUSTRE_TARBALL_NAME>"
            baseImageRegistryTLS:
              insecure: true
              insecureSkipTLSVerify: true
            dockerfileConfigMap:
              name: lustre-ubuntu20-dockerfile
          registryTLS:
            insecure: true
            insecureSkipTLSVerify: true

        # Ubuntu 20.04 - Kernel 5.15.0-*-generic (HWE kernel from 22.04)
        # Supports: 5.15.0-100-generic, 5.15.0-139-generic, etc.
        - regexp: '^5\.15\.0-[0-9]+-generic$'
          containerImage: "<REGISTRY_URL>/lustre-client-ubuntu20:${KERNEL_FULL_VERSION}"
          build:
            buildArgs:
              - name: LUSTRE_TARBALL_NAME
                value: "<LUSTRE_TARBALL_NAME>"
              - name: LUSTRE_SOURCE_URL
                value: "http://<LUSTRE_SOURCE_SERVER>/<LUSTRE_TARBALL_NAME>"
            baseImageRegistryTLS:
              insecure: true
              insecureSkipTLSVerify: true
            dockerfileConfigMap:
              name: lustre-ubuntu20-dockerfile
          registryTLS:
            insecure: true
            insecureSkipTLSVerify: true

  selector:
    node-role.kubernetes.io/worker: ""
    os-version: ubuntu-20.04
    # Dependency: Requires lnet-mod-ubuntu20 to be loaded first (libcfs, lnet, ksocklnd)
    kmm.node.kubernetes.io/lustre-kmm.lnet-ubuntu20.ready: ""
